<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תְּמוּרָה - הגדרות</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            direction: rtl;
            color: #1d1d1f;
        }
        .header { background: #0071e3; color: white; padding: 24px; text-align: center; }
        .header h1 { font-size: 24px; font-weight: 800; }
        .header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .container { max-width: 500px; margin: 24px auto; padding: 0 16px; }
        .group {
            background: white; border-radius: 16px; padding: 20px;
            margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .group h2 { font-size: 16px; font-weight: 700; color: #0071e3; margin-bottom: 14px; }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .row:last-child { border-bottom: none; }
        .row label { font-size: 14px; font-weight: 500; }
        select { padding: 8px 14px; border: 2px solid #d2d2d7; border-radius: 10px; background: white; font-family: 'Segoe UI', system-ui, sans-serif; cursor: pointer; }
        select:focus { border-color: #0071e3; outline: none; }
        .toggle { position: relative; width: 50px; height: 28px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #d2d2d7; transition: 0.3s; border-radius: 28px; }
        .toggle .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background: white; transition: 0.3s; border-radius: 50%; }
        .toggle input:checked + .slider { background: #0071e3; }
        .toggle input:checked + .slider:before { transform: translateX(22px); }
        .save-btn { width: 100%; padding: 14px; background: #0071e3; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Segoe UI', system-ui, sans-serif; }
        .save-btn:hover { background: #0059c4; }
        .status { margin-top: 12px; text-align: center; font-size: 13px; color: #34c759; min-height: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="headerTitle">תְּמוּרָה</h1>
        <p id="headerSub">הגדרות תוסף</p>
    </div>
    <div class="container">
        <div class="group">
            <h2 id="langTitle">שפה</h2>
            <div class="row">
                <label id="langLabel">שפת ממשק:</label>
                <select id="langSelect">
                    <option value="he">עברית</option>
                    <option value="yi">אידיש</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
        <div class="group">
            <h2 id="modeTitle">מצב פעולה</h2>
            <div class="row">
                <label id="modeLabel">פעולה באתרים:</label>
                <select id="modeSelect">
                    <option value="all" id="modeAllOpt">כל האתרים</option>
                    <option value="gmail" id="modeGmailOpt">רק Gmail</option>
                </select>
            </div>
        </div>
        <div class="group">
            <h2 id="videoTitle">וידאו</h2>
            <div class="row">
                <label id="videoLabel">תמיכה בוידאו:</label>
                <label class="toggle">
                    <input type="checkbox" id="videoToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <button class="save-btn" id="saveBtn">שמור הגדרות</button>
        <div class="status" id="statusMsg"></div>
    </div>
    <script src="settings.js"></script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תְּמוּרָה</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            text-align: center;
            background: #0071e3;
            direction: rtl;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        h3 { color: #0071e3; font-size: 20px; margin-bottom: 4px; font-weight: 800; }
        .subtitle { color: #86868b; font-size: 11px; margin-bottom: 14px; }
        .site-info { background: #f5f5f7; padding: 10px; border-radius: 10px; margin-bottom: 12px; font-size: 12px; color: #1d1d1f; }
        button {
            width: 100%; padding: 11px; margin-top: 10px; cursor: pointer;
            border-radius: 10px; border: none; background: #0071e3; color: white;
            font-weight: 600; font-size: 14px; transition: all 0.2s ease;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        button:hover { background: #0059c4; }
        button:active { transform: scale(0.98); }
        button.danger { background: #ff3b30; font-size: 13px; padding: 10px; }
        button.danger:hover { background: #d63028; }
        button.success { background: #34c759; }
        button.success:hover { background: #2db84d; }
        button.secondary { background: #86868b; font-size: 13px; padding: 10px; }
        button.secondary:hover { background: #636366; }
        .status {
            margin-top: 10px; font-size: 12px; color: #86868b; min-height: 18px;
            padding: 6px 8px; border-radius: 8px; background: #f5f5f7;
        }
        .status.success { color: #34c759; background: #f0fff4; }
        .status.error { color: #ff3b30; background: #fff5f5; }
        .status.loading { color: #0071e3; background: #f5f7ff; }
        .info-box { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 12px; font-size: 12px; color: #666; }
        .divider { height: 1px; background: #e5e5ea; margin: 14px 0; }
        #siteControlsContainer { text-align: right; margin-top: 10px; }
        .site-controls-title { font-size: 12px; font-weight: 600; color: #86868b; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h3 id="popupTitle">תְּמוּרָה</h3>
        <div class="subtitle" id="popupSubtitle">כיווץ והמרת קבצים חכמה</div>
        <div class="info-box" id="popupInfo">גרור תמונות ווידאו לכל דף ברשת</div>
        <div class="site-info" id="siteInfo"></div>
        <button id="testHost">בדוק חיבור לתוכנה</button>
        <div id="status" class="status"></div>
        <div class="divider"></div>
        <div id="siteControlsContainer">
            <span class="site-controls-title" id="siteControlLabel">ניהול אתר</span>
            <button class="danger" id="toggleSiteBtn">בטל בעבור אתר זה</button>
        </div>
        <div class="divider"></div>
        <button class="secondary" id="settingsBtn">הגדרות תוסף</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
